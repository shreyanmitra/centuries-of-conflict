<div class="finite-spaces-layout approximation-layout mb-3">
  <div class="approx-panel p-3 mb-0">
    <p class="mb-2">
      <strong>Target:</strong>
      <span id="approx-target-label">sin(x)</span>
    </p>

    <div class="mb-3">
      <label for="approx-degree-slider" class="form-label fw-semibold"
        >Degree: <span id="approx-degree-value">4</span></label
      >
      <input
        id="approx-degree-slider"
        class="form-range"
        type="range"
        min="1"
        max="12"
        step="1"
        value="4"
      />
    </div>

    <div class="d-flex flex-wrap gap-4 align-items-center mb-3">
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="fit-mode"
          id="fit-least-squares"
          value="leastSquares"
          checked
        />
        <label class="form-check-label" for="fit-least-squares">
          Least Squares
        </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="fit-mode"
          id="fit-interpolation"
          value="interpolation"
        />
        <label class="form-check-label" for="fit-interpolation">
          Interpolation
        </label>
      </div>
    </div>

    <div class="d-flex flex-wrap gap-4 mb-3">
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          id="approx-highlight-max"
          checked
        />
        <label class="form-check-label" for="approx-highlight-max">
          Highlight max error point
        </label>
      </div>
    </div>

    <div class="small mb-0">
      Error norm (RMS): <strong id="approx-error-norm">0.000000</strong>
    </div>
  </div>

  <div class="vstack gap-3">
    <div class="approx-plot-wrap p-2 mb-0">
      <svg
        id="approx-main-chart"
        width="100%"
        height="320"
        viewBox="0 0 760 320"
      ></svg>
    </div>

    <div class="approx-plot-wrap p-2 mb-0">
      <svg
        id="approx-error-chart"
        width="100%"
        height="200"
        viewBox="0 0 760 200"
      ></svg>
    </div>
  </div>
</div>
