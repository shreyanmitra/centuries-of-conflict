<div class="runge-layout mb-3">
  <div class="runge-controls">
    <div class="control-panel p-3 mb-0">
      <p class="mb-2"><strong>Target:</strong></p>
      <div class="runge-equation mb-3">f(x) = 1 / (1 + 25x<sup>2</sup>)</div>

      <div class="mb-0">
        <label for="runge-degree-slider" class="form-label fw-semibold"
          >Degree n: <span id="runge-degree-value">8</span></label
        >
        <input
          id="runge-degree-slider"
          class="form-range"
          type="range"
          min="2"
          max="32"
          step="1"
          value="8"
        />
      </div>
    </div>

    <div class="control-panel p-3 mb-0">
      <p class="mb-2"><strong>Nodes:</strong></p>
      <div class="d-flex flex-wrap gap-4 mb-3">
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="runge-node-type"
            id="runge-nodes-equispaced"
            value="equispaced"
            checked
          />
          <label class="form-check-label" for="runge-nodes-equispaced">
            Equispaced nodes
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="runge-node-type"
            id="runge-nodes-chebyshev"
            value="chebyshev"
          />
          <label class="form-check-label" for="runge-nodes-chebyshev">
            Chebyshev nodes
          </label>
        </div>
      </div>

      <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" id="runge-show-cond" />
        <label class="form-check-label" for="runge-show-cond">
          Show condition number increasing
        </label>
      </div>
      <div class="small text-muted mb-2" id="runge-cond-readout">
        Condition number hidden
      </div>

      <div class="small runge-osc-note mb-0">
        Oscillations near edges are highlighted.
      </div>
    </div>
  </div>

  <div class="chart-wrap p-2 mb-0">
    <svg id="runge-chart" width="100%" height="360" viewBox="0 0 760 360"></svg>
  </div>
</div>
