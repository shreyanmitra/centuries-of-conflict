<div class="aliasing-layout mb-3">
  <div class="aliasing-controls">
    <div class="control-panel p-3 mb-0">
      <p class="mb-2"><strong>Sampling</strong></p>

      <div class="mb-3">
        <label for="aliasing-n-slider" class="form-label fw-semibold">
          Sample points N: <span id="aliasing-n-value">8</span>
        </label>
        <input
          id="aliasing-n-slider"
          class="form-range"
          type="range"
          min="4"
          max="24"
          step="1"
          value="8"
        />
      </div>

      <div class="small text-muted mb-0" id="aliasing-freq-readout">
        True: sin(2πx) &nbsp;·&nbsp; Alias: sin(2π·9x)
      </div>
    </div>

    <div class="control-panel p-3 mb-0">
      <p class="mb-2"><strong>Legend</strong></p>
      <div class="d-flex flex-column gap-2">
        <div class="d-flex align-items-center gap-2">
          <svg width="32" height="8">
            <line
              x1="0"
              y1="4"
              x2="32"
              y2="4"
              stroke="#6c757d"
              stroke-width="2.8"
            />
          </svg>
          <span class="small">True signal: sin(2πx)</span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <svg width="32" height="8">
            <line
              x1="0"
              y1="4"
              x2="32"
              y2="4"
              stroke="#fd7e14"
              stroke-width="2.2"
            />
          </svg>
          <span class="small">Alias: sin(2π(1+N)x)</span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <svg width="14" height="14">
            <circle
              cx="7"
              cy="7"
              r="5"
              fill="#dc3545"
              stroke="white"
              stroke-width="1.2"
            />
          </svg>
          <span class="small">Sample points (identical on both)</span>
        </div>
      </div>
    </div>
  </div>

  <div class="chart-wrap p-2 mb-0">
    <svg
      id="aliasing-chart"
      width="100%"
      height="360"
      viewBox="0 0 760 360"
    ></svg>
  </div>
</div>
