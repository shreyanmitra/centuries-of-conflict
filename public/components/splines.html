<div class="splines-layout mb-3">
  <div class="splines-controls">
    <div class="control-panel p-3 mb-0">
      <p class="mb-2"><strong>Target:</strong></p>
      <div class="d-flex flex-wrap gap-4 mb-3">
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="spline-target"
            id="spline-target-runge"
            value="runge"
            checked
          />
          <label class="form-check-label" for="spline-target-runge">
            Runge function
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="spline-target"
            id="spline-target-spiral"
            value="spiral"
          />
          <label class="form-check-label" for="spline-target-spiral">
            Spiral slice
          </label>
        </div>
      </div>

      <div class="mb-0">
        <label for="spline-segment-slider" class="form-label fw-semibold"
          >Number of segments: <span id="spline-segment-value">8</span></label
        >
        <input
          id="spline-segment-slider"
          class="form-range"
          type="range"
          min="2"
          max="24"
          step="1"
          value="8"
        />
      </div>
    </div>

    <div class="control-panel p-3 mb-0">
      <p class="mb-2"><strong>Model:</strong></p>
      <div class="d-flex flex-wrap gap-4 mb-3">
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="spline-mode"
            id="spline-mode-global"
            value="global"
            checked
          />
          <label class="form-check-label" for="spline-mode-global">
            Single high-degree polynomial
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="spline-mode"
            id="spline-mode-cubic"
            value="spline"
          />
          <label class="form-check-label" for="spline-mode-cubic">
            Cubic spline
          </label>
        </div>
      </div>

      <p class="mb-2"><strong>Continuity:</strong></p>
      <div class="d-flex flex-wrap gap-4 mb-3">
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="spline-continuity"
            id="spline-c0"
            value="C0"
          />
          <label class="form-check-label" for="spline-c0">C⁰</label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="spline-continuity"
            id="spline-c1"
            value="C1"
            checked
          />
          <label class="form-check-label" for="spline-c1">C¹</label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="spline-continuity"
            id="spline-c2"
            value="C2"
          />
          <label class="form-check-label" for="spline-c2">C²</label>
        </div>
      </div>

      <div class="small text-muted mb-0" id="spline-local-support-text">
        Local support highlighted around one knot neighborhood.
      </div>
    </div>
  </div>

  <div class="splines-visuals">
    <div class="chart-wrap p-2 mb-0">
      <svg
        id="spline-main-chart"
        width="100%"
        height="360"
        viewBox="0 0 760 360"
      ></svg>
    </div>

    <div class="chart-wrap p-2 mb-0">
      <svg
        id="spline-error-chart"
        width="100%"
        height="190"
        viewBox="0 0 760 190"
      ></svg>
    </div>

    <div class="chart-wrap p-2 mb-0 d-none" id="spline-curvature-wrap">
      <svg
        id="spline-curvature-chart"
        width="100%"
        height="190"
        viewBox="0 0 760 190"
      ></svg>
    </div>
  </div>
</div>
