<div class="infinite-layout mb-3">
  <div class="infinite-controls">
    <div class="infinite-panel p-3 mb-0">
      <p class="mb-1"><strong>Target:</strong></p>
      <div class="infinite-math mb-3">
        <div>r = ae<sup>bθ</sup></div>
        <div class="small text-muted">(a = 0.14, b = 0.21)</div>
      </div>

      <div class="mb-3">
        <label for="infinite-segment-slider" class="form-label fw-semibold"
          >Number of spline segments:
          <span id="infinite-segment-value">12</span></label
        >
        <input
          id="infinite-segment-slider"
          class="form-range"
          type="range"
          min="4"
          max="48"
          step="1"
          value="12"
        />
      </div>

      <div class="mb-0">
        <label for="infinite-zoom-slider" class="form-label fw-semibold"
          >Zoom level (infinite zoom feel):
          <span id="infinite-zoom-value">1.0×</span></label
        >
        <input
          id="infinite-zoom-slider"
          class="form-range"
          type="range"
          min="0"
          max="100"
          step="1"
          value="0"
        />
      </div>
    </div>

    <div class="infinite-panel p-3 mb-0" style="display: none">
      <p class="mb-2"><strong>Toggle:</strong></p>
      <div class="d-flex flex-wrap gap-4 mb-3">
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="infinite-show-exact"
            checked
          />
          <label class="form-check-label" for="infinite-show-exact"
            >Exact</label
          >
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="infinite-show-cubic"
            checked
          />
          <label class="form-check-label" for="infinite-show-cubic">
            Cubic spline
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="infinite-show-poly"
          />
          <label class="form-check-label" for="infinite-show-poly">
            Single polynomial
          </label>
        </div>
      </div>

      <p class="mb-2"><strong>Visuals:</strong></p>
      <div class="d-flex flex-wrap gap-4 mb-2">
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="infinite-overlay-toggle"
            checked
          />
          <label class="form-check-label" for="infinite-overlay-toggle">
            Overlay exact vs approx
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="infinite-heatmap-toggle"
            checked
          />
          <label class="form-check-label" for="infinite-heatmap-toggle">
            Heatmap of error
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="infinite-curvature-toggle"
            checked
          />
          <label class="form-check-label" for="infinite-curvature-toggle">
            Show curvature difference
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="infinite-self-sim-toggle"
            checked
          />
          <label class="form-check-label" for="infinite-self-sim-toggle">
            Infinite zoom (self-similarity moment)
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="infinite-error-graph-toggle"
          />
          <label class="form-check-label" for="infinite-error-graph-toggle">
            Display error vs segments graph
          </label>
        </div>
      </div>

      <div class="small text-muted mb-0" id="infinite-metrics">
        RMS error: 0.000000 | max error: 0.000000
      </div>
    </div>
  </div>

  <div class="infinite-visuals">
    <div class="infinite-chart-wrap p-2 mb-0">
      <svg
        id="infinite-main-chart"
        width="100%"
        height="380"
        viewBox="0 0 760 380"
      ></svg>
    </div>

    <div class="infinite-chart-wrap p-2 mb-0" id="infinite-heatmap-wrap">
      <svg
        id="infinite-heatmap-chart"
        width="100%"
        height="90"
        viewBox="0 0 760 90"
      ></svg>
    </div>

    <div class="infinite-chart-wrap p-2 mb-0" id="infinite-curvature-wrap">
      <svg
        id="infinite-curvature-chart"
        width="100%"
        height="190"
        viewBox="0 0 760 190"
      ></svg>
    </div>

    <div
      class="infinite-chart-wrap p-2 mb-0 d-none"
      id="infinite-error-graph-wrap"
    >
      <svg
        id="infinite-error-graph"
        width="100%"
        height="190"
        viewBox="0 0 760 190"
      ></svg>
    </div>
  </div>
</div>
