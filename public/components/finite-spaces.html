<div class="finite-spaces-layout mb-4">
  <div
    id="polynomial-equation"
    class="finite-math px-3 py-2"
    aria-live="polite"
  ></div>

  <div class="control-panel p-3 mb-0">
    <div class="mb-3">
      <label for="degree-slider" class="form-label fw-semibold"
        >Degree n: <span id="degree-value">3</span></label
      >
      <input
        id="degree-slider"
        class="form-range"
        type="range"
        min="0"
        max="8"
        step="1"
        value="3"
      />
      <div class="small text-muted" id="dimension-text">
        Space dimension = 4
      </div>
    </div>

    <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
      <button id="random-btn" class="btn btn-outline-primary btn-sm">
        Random polynomial
      </button>
      <div class="form-check ms-1">
        <input class="form-check-input" type="checkbox" id="basis-toggle" />
        <label class="form-check-label" for="basis-toggle">
          Show basis functions separately
        </label>
      </div>
    </div>

    <div id="coeff-sliders" class="vstack gap-2"></div>
  </div>

  <div class="chart-wrap p-2 mb-0">
    <svg id="poly-chart" width="100%" height="420" viewBox="0 0 760 420"></svg>
  </div>
</div>
